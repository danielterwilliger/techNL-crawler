name: Keyless crawl (manual / fork fallback)

# Keyless pipeline: discover -> heuristic-map -> scrape -> publish -> commit + deploy.
#
# This instance's REAL crawler is the producer box (systemd, OAuth, the staged
# navigator) — see deploy/. So this is DISPATCH-ONLY: no schedule, so it can never
# auto-overwrite the producer's richer LLM-found data. It exists for (a) community
# forks with no producer, and (b) manual keyless testing. It self-deploys Pages
# because its GITHUB_TOKEN push wouldn't trigger pages.yml.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Scrape only the first N companies (blank = all; handy for a test)"
        required: false
        default: ""

concurrency:
  group: crawl
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python + dependencies
        run: uv sync
      - name: Install Chromium (with system deps)
        run: uv run playwright install --with-deps chromium
      - name: Discover companies (keyless)
        run: uv run python src/discover.py
      - name: Map careers pages — heuristic (keyless)
        run: uv run python src/map_careers.py
      - name: Scrape listings (keyless, heuristic navigator)
        env:
          LIMIT: ${{ github.event.inputs.limit }}
        run: |
          if [ -n "$LIMIT" ]; then
            uv run python src/scrape.py --limit "$LIMIT"
          else
            uv run python src/scrape.py
          fi
      - name: Publish feed + dashboard data
        run: uv run python src/publish.py
      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: keyless feed refresh [skip ci]"
            git push
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
